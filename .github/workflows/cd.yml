name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
  
    steps:
      - name: Checkout
        uses: actions/checkout@v6
  
      - name: set up node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: set up npm
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        

    
